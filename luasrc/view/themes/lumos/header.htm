<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuCI - LumOS</title>
    <link rel="stylesheet" href="<%=media%>/css/fonts.css">
    <link rel="stylesheet" href="<%=media%>/css/style.css">
    <link rel="stylesheet" href="<%=media%>/css/dark.css" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="<%=media%>/css/light.css" media="(prefers-color-scheme: light)">
    <script src="<%=media%>/js/main.js"></script>
</head>
<body class="luci">

<div class="lumos-bg">
    <div class="lumos-orb lumos-orb-1"></div>
    <div class="lumos-orb lumos-orb-2"></div>
    <div class="lumos-orb lumos-orb-3"></div>
    <div class="lumos-particles"></div>
</div>

<header class="lumos-header">
    <div class="container">
        <div class="lumos-logo">
            <span class="lumos-icon lumos-font-argon">L</span>
            <span class="lumos-title lumos-font-typo">LumOS</span>
        </div>
        <div class="lumos-nav">
            <div class="lumos-nav-item" data-toggle="collapse" data-target="#mainmenu">
                <span>☰</span>
            </div>
        </div>
    </div>
</header>

<div id="mainmenu" class="lumos-menu collapse">
    <div class="container">
        <ul class="lumos-nav-list">
            <% for _, node in ipairs(ipairs(model.menu)) do %>
            <li class="lumos-nav-item">
                <a href="<%=node.target%>"><%=node.title%></a>
            </li>
            <% end %>
        </ul>
    </div>
</div>

<div class="lumos-main">
    <div class="container">
        <div class="lumos-content glass-panel">
            <%:LumOS Theme%>
        </div>
    </div>
</div>

<footer class="lumos-footer">
    <div class="container">
        <div class="lumos-status">
            <span class="lumos-cpu">
                CPU: <span class="lumos-value" id="lumos-cpu">0</span>%
            </span>
            <span class="lumos-mem">
                <%:Memory%>: <span class="lumos-value" id="lumos-mem">0</span>%
            </span>
        </div>
        <div class="lumos-time" id="lumos-time"></div>
    </div>
</footer>

<script>
Lumos.start();
</script>

</body>
</html>
