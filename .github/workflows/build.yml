name: Build OpenWrt Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
          zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 \
          python3-distutils python3-setuptools rsync flex bison patch curl \
          python2 bc
    
    - name: Download OpenWrt 19.07 SDK for x86_64
      run: |
        wget -q https://downloads.openwrt.org/releases/19.07.10/targets/x86/64/openwrt-sdk-19.07.10-x86-64_gcc-7.5.0_musl.Linux-x86_64.tar.xz
        tar -xJf openwrt-sdk-19.07.10-x86-64_gcc-7.5.0_musl.Linux-x86_64.tar.xz
        mv openwrt-sdk-19.07.10-x86-64_gcc-7.5.0_musl.Linux-x86_64 openwrt-sdk
    
    - name: Copy theme to SDK
      run: |
        mkdir -p openwrt-sdk/package/luci-theme-lumos
        cp -r ./* openwrt-sdk/package/luci-theme-lumos/
    
    - name: Update feeds
      run: |
        cd openwrt-sdk
        ./scripts/feeds update -a
        ./scripts/feeds install luci-base luci-lib-ipkg
    
    - name: Configure and build
      run: |
        cd openwrt-sdk
        make defconfig
        make package/luci-theme-lumos/compile V=s -j$(nproc) 2>&1 | tail -150
    
    - name: Find built package
      id: find_package
      run: |
        cd openwrt-sdk
        PACKAGE_PATH=$(find bin -name "luci-theme-lumos_*.ipk" | head -1)
        if [ -n "$PACKAGE_PATH" ]; then
          echo "package_path=$PACKAGE_PATH" >> $GITHUB_OUTPUT
          ls -la "$PACKAGE_PATH"
        else
          echo "Package not found!"
          find bin -name "*.ipk" | head -20
          exit 1
        fi
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: luci-theme-lumos-x86_64
        path: openwrt-sdk/${{ steps.find_package.outputs.package_path }}