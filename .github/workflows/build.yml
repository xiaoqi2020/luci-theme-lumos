name: Build OpenWrt Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Target platform'
        required: true
        default: 'x86_64'
        type: choice
        options:
          - x86_64
          - arm_cortex-a9
          - aarch64_generic

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        path: luci-theme-lumos
    
    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
          zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 \
          python3-distutils python3-setuptools rsync flex bison patch curl \
          python2
        sudo ln -sf /usr/bin/python2 /usr/bin/python
    
    - name: Clone OpenWrt 19.07
      uses: actions/checkout@v4
      with:
        repository: openwrt/openwrt
        ref: openwrt-19.07
        path: openwrt
        fetch-depth: 1
    
    - name: Copy theme to package directory
      run: |
        cd openwrt
        mkdir -p package/luci-theme-lumos
        cp -r ../luci-theme-lumos/* package/luci-theme-lumos/
    
    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
    
    - name: Install luci feeds
      run: |
        cd openwrt
        ./scripts/feeds install luci-base
        ./scripts/feeds install luci-lib-ipkg
        ./scripts/feeds install luci-mod-admin-full
    
    - name: Configure build for x86_64
      if: ${{ github.event.inputs.target == 'x86_64' || !github.event.inputs.target }}
      run: |
        cd openwrt
        echo "CONFIG_TARGET_x86=y" >> .config
        echo "CONFIG_TARGET_x86_64=y" >> .config
        echo "CONFIG_TARGET_x86_64_Generic=y" >> .config
        echo "CONFIG_PACKAGE_luci-theme-lumos=y" >> .config
        echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
        make defconfig
    
    - name: Configure build for arm_cortex-a9
      if: ${{ github.event.inputs.target == 'arm_cortex-a9' }}
      run: |
        cd openwrt
        echo "CONFIG_TARGET_ath79=y" >> .config
        echo "CONFIG_TARGET_ath79_generic=y" >> .config
        echo "CONFIG_PACKAGE_luci-theme-lumos=y" >> .config
        echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
        make defconfig
    
    - name: Configure build for aarch64_generic
      if: ${{ github.event.inputs.target == 'aarch64_generic' }}
      run: |
        cd openwrt
        echo "CONFIG_TARGET_armvirt=y" >> .config
        echo "CONFIG_TARGET_armvirt_64=y" >> .config
        echo "CONFIG_PACKAGE_luci-theme-lumos=y" >> .config
        echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
        make defconfig
    
    - name: Build dependencies first
      run: |
        cd openwrt
        make package/luci-base/compile V=s -j$(nproc) 2>&1 | tail -50
    
    - name: Build luci-theme-lumos package
      run: |
        cd openwrt
        make package/luci-theme-lumos/compile V=s -j$(nproc) 2>&1 | tail -100
    
    - name: List bin directory
      run: |
        cd openwrt
        ls -la bin/
        ls -la bin/packages/ 2>/dev/null || echo "bin/packages not found"
        find bin -name "*.ipk" | head -20
    
    - name: Find built package
      id: find_package
      run: |
        cd openwrt
        PACKAGE_PATH=$(find bin -name "luci-theme-lumos_*.ipk" | head -1)
        if [ -z "$PACKAGE_PATH" ]; then
          echo "Package not found!"
          exit 1
        fi
        echo "package_path=$PACKAGE_PATH" >> $GITHUB_OUTPUT
        echo "Found package: $PACKAGE_PATH"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: luci-theme-lumos-${{ github.event.inputs.target || 'x86_64' }}
        path: openwrt/${{ steps.find_package.outputs.package_path }}